name: IBKR daily sync

# Pre-fetch each user's IBKR Flex statement and cache it so the app can import it
# instantly on login without hitting error 1001.
#
# NOTE: Scheduling moved to Supabase pg_cron (see the ibkr-cron Edge Function and
# the schedule_ibkr_cron_jobs migration). GitHub Actions' scheduled runs proved
# unreliable — most ticks were silently dropped — so the `schedule:` triggers were
# removed. This workflow stays only as a manual fallback (Run workflow).
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'full or confirm'
        default: 'full'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # 22 has native WebSocket (supabase-js realtime needs it)

      - name: Install dependencies
        run: npm install @supabase/supabase-js@2

      - name: Run IBKR sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ibkr-sync.mjs ${{ github.event.schedule == '0 13 * * 1-5' && 'full' || (github.event_name == 'workflow_dispatch' && inputs.mode || 'confirm') }}
