<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07122a"/>
      <stop offset="100%" stop-color="#0c1d3f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#0e2040" stroke-width="1.5"/>

  <!-- Subtle grid lines -->
  <line x1="44" y1="60"  x2="156" y2="60"  stroke="#0e2040" stroke-width="1"/>
  <line x1="44" y1="90"  x2="156" y2="90"  stroke="#0e2040" stroke-width="1"/>
  <line x1="44" y1="120" x2="156" y2="120" stroke="#0e2040" stroke-width="1"/>

  <!-- Candlestick 1 — bearish (red), short -->
  <line x1="58" y1="102" x2="58" y2="130" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <rect x="52" y="110" width="12" height="16" rx="2" fill="#ef4444" opacity="0.7"/>

  <!-- Candlestick 2 — bullish, medium -->
  <line x1="85"  y1="88" x2="85"  y2="122" stroke="url(#accent)" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="79" y="95" width="12" height="22" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Candlestick 3 — bullish, tall (hero) -->
  <line x1="112" y1="65" x2="112" y2="112" stroke="url(#accent)" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="106" y="72" width="12" height="34" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Candlestick 4 — bullish, tallest -->
  <line x1="139" y1="52" x2="139" y2="95" stroke="url(#green)" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="133" y="58" width="12" height="30" rx="2" fill="url(#green)" filter="url(#glow)"/>

  <!-- Upward trend arrow -->
  <polyline points="52,132 85,108 112,88 139,70" fill="none" stroke="rgba(56,189,248,0.25)" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Brand name -->
  <text x="100" y="162" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#f0f8ff" text-anchor="middle" letter-spacing="1.5">TRADING</text>
  <text x="100" y="178" font-family="'Inter','Segoe UI',sans-serif" font-size="10" font-weight="400" fill="#38bdf8" text-anchor="middle" letter-spacing="3">JOURNAL</text>
</svg>
