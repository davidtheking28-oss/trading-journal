  <text x="768" y="171" font-family="monospace" font-size="10" fill="#3d5a7a">P&amp;L MTD</text>
  <text x="768" y="198" font-family="monospace" font-size="20" font-weight="600" fill="#00e676">+$4,320</text>

  <rect x="876" y="152" width="112" height="60" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="888" y="171" font-family="monospace" font-size="10" fill="#3d5a7a">WIN RATE</text>
  <text x="888" y="198" font-family="monospace" font-size="20" font-weight="600" fill="#4f7fff">68.1%</text>

  <rect x="996" y="152" width="112" height="60" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="1008" y="171" font-family="monospace" font-size="10" fill="#3d5a7a">TRADES</text>
  <text x="1008" y="198" font-family="monospace" font-size="20" font-weight="600" fill="#e4ecf8">47</text>

