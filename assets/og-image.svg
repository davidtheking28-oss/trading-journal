  <rect x="740" y="100" width="400" height="430" rx="20" fill="#09152a" stroke="rgba(79,127,255,0.2)" stroke-width="1"/>
  <rect x="740" y="100" width="400" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Card header -->
  <circle cx="766" cy="130" r="6" fill="#ff5f57"/>
  <circle cx="784" cy="130" r="6" fill="#febc2e"/>
  <circle cx="802" cy="130" r="6" fill="#28c840"/>
