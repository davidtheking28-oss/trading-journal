<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #030912;
  font-family: 'Segoe UI', Arial, sans-serif;
  direction: rtl;
}
.bg-glow-1 {
  position: absolute; top: -100px; right: -60px;
  width: 550px; height: 550px; border-radius: 50%;
  background: radial-gradient(circle, rgba(79,127,255,0.22) 0%, transparent 65%);
  pointer-events: none;
}
.bg-glow-2 {
  position: absolute; bottom: -120px; left: -80px;
  width: 450px; height: 450px; border-radius: 50%;
  background: radial-gradient(circle, rgba(155,114,255,0.18) 0%, transparent 65%);
  pointer-events: none;
}
.layout {
  position: relative; z-index: 1;
  display: flex; flex-direction: row;
  align-items: center;
  height: 630px;
  padding: 0 70px;
  gap: 60px;
}
.text-side {
  flex: 1; display: flex; flex-direction: column;
  align-items: flex-end; text-align: right;
}
.logo-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}
.logo-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, #4f7fff, #9b72ff);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(79,127,255,0.45);
}
.logo-text {
  font-size: 19px; font-weight: 700; color: #e4ecf8;
}
.headline {
  font-size: 54px; font-weight: 800; line-height: 1.18;
  color: #e4ecf8; margin-bottom: 18px; letter-spacing: -1px;
}
.grad {
  background: linear-gradient(135deg, #4f7fff 0%, #9b72ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sub {
  font-size: 19px; color: #7a9cc4; line-height: 1.55;
  margin-bottom: 32px; max-width: 520px;
}
.badges { display: flex; gap: 10px; }
.badge {
  padding: 8px 16px; border-radius: 100px;
  font-size: 13px; font-weight: 600; border: 1px solid;
  white-space: nowrap;
}
.badge-free  { background: rgba(0,230,118,0.1); color: #00e676; border-color: rgba(0,230,118,0.2); }
.badge-ai    { background: rgba(79,127,255,0.1); color: #6fa3ff; border-color: rgba(79,127,255,0.2); }
.badge-ibkr  { background: rgba(155,114,255,0.1); color: #b899ff; border-color: rgba(155,114,255,0.2); }

/* Card */
.card {
  width: 260px; flex-shrink: 0;
  background: linear-gradient(145deg, #091525, #0c1f3a);
  border: 1px solid rgba(79,127,255,0.18); border-radius: 18px;
  padding: 22px 20px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
}
.metric { margin-bottom: 16px; }
.m-label { font-size: 9px; color: #3d5a7a; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; text-align: left; }
.m-val { font-size: 22px; font-weight: 800; text-align: left; letter-spacing: -0.5px; }
.green { color: #00e676; }
.blue  { color: #6fa3ff; }
.white { color: #e4ecf8; }
.divider { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }
.trade { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; direction: ltr; }
.t-sym { font-size: 13px; font-weight: 700; color: #e4ecf8; }
.t-meta { font-size: 11px; color: #3d5a7a; }
.t-pos { font-size: 13px; font-weight: 700; color: #00e676; }
.t-neg { font-size: 13px; font-weight: 700; color: #ff4060; }
.ai-pill {
  margin-top: 14px; padding: 9px 12px;
  background: rgba(79,127,255,0.08);
  border: 1px solid rgba(79,127,255,0.15);
  border-radius: 8px;
  font-size: 11px; color: #6fa3ff; direction: rtl; text-align: right;
}
</style>
</head>
<body>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="layout">
  <!-- Card left side -->
  <div class="card">
    <div class="metric">
      <div class="m-label">P&amp;L MTD</div>
      <div class="m-val green">+$4,320</div>
    </div>
    <div class="metric">
      <div class="m-label">WIN RATE</div>
      <div class="m-val blue">68.1%</div>
    </div>
    <div class="metric" style="margin-bottom:0">
      <div class="m-label">TRADES</div>
      <div class="m-val white">47</div>
    </div>
    <div class="divider"></div>
    <div class="trade">
      <span class="t-sym">NVDA</span>
      <span class="t-pos">+$1,240</span>
    </div>
    <div class="trade">
      <span class="t-sym">BTC</span>
      <span class="t-pos">+$890</span>
    </div>
    <div class="trade" style="margin-bottom:0">
      <span class="t-sym">TSLA</span>
      <span class="t-neg">-$210</span>
    </div>
    <div class="ai-pill">✦ AI: win rate השתפר +8%</div>
  </div>

  <!-- Text right side -->
  <div class="text-side">
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 200 200" fill="none">
          <line x1="44" y1="60" x2="156" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
          <line x1="44" y1="90" x2="156" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
          <line x1="44" y1="120" x2="156" y2="120" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
          <rect x="52" y="110" width="14" height="16" rx="3" fill="#ff6b8a"/>
          <rect x="79" y="95" width="14" height="31" rx="3" fill="#6fa3ff"/>
          <rect x="106" y="72" width="14" height="54" rx="3" fill="#6fa3ff"/>
          <rect x="133" y="58" width="14" height="68" rx="3" fill="#00e676"/>
          <polyline points="59,126 86,111 113,88 140,75" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-text">Trading Journal</span>
    </div>

    <div class="headline">
      יומן מסחר מקצועי<br>עם <span class="grad">ניתוח AI</span>
    </div>
    <div class="sub">
      ייבא עסקאות מהברוקר אוטומטית,<br>
      נתח ביצועים וגלה את הדפוסים<br>
      שמפרידים בין רווח להפסד.
    </div>
    <div class="badges">
      <div class="badge badge-free">חינמי לחלוטין</div>
      <div class="badge badge-ai">AI Analysis</div>
      <div class="badge badge-ibkr">IBKR + Bybit</div>
    </div>
  </div>
</div>
</body>
</html>
