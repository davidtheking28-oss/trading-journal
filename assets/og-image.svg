  <rect x="756" y="228" width="352" height="100" rx="8" fill="rgba(79,127,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <path d="M756,318 C790,310 820,290 860,272 C900,254 930,268 970,248 C1010,228 1040,238 1080,224 C1108,215 1108,228 1108,228 L1108,328 L756,328Z" fill="url(#chartfill)"/>
  <path d="M756,318 C790,310 820,290 860,272 C900,254 930,268 970,248 C1010,228 1040,238 1080,224 L1108,216" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>

