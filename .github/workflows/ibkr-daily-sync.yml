name: IBKR daily sync

# Pre-fetch each user's IBKR Flex statement at a time when IBKR's reporting
# backend is available (after the once-daily EOD batch), and cache it so the app
# can import it instantly on login without hitting error 1001.
on:
  schedule:
    # Daily FULL run: pulls the Activity Flex (365-day history) + confirm. This is
    # what backfills history for new users and reconciles everyone once a day.
    - cron: '0 13 * * 1-5'         # once daily, ~13:00 UTC (~9:00 ET), Mon-Fri
    # Intraday CONFIRM run: Trade Confirmation Flex updates within the day, so pull
    # frequently during US market hours to surface fills/closes within ~30 min.
    - cron: '*/30 13-21 * * 1-5'   # every 30 min, ~13:00-21:00 UTC, Mon-Fri
  workflow_dispatch:
    inputs:
      mode:
        description: 'full or confirm'
        default: 'full'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # 22 has native WebSocket (supabase-js realtime needs it)

      - name: Install dependencies
        run: npm install @supabase/supabase-js@2

      - name: Run IBKR sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ibkr-sync.mjs ${{ github.event.schedule == '0 13 * * 1-5' && 'full' || (github.event_name == 'workflow_dispatch' && inputs.mode || 'confirm') }}
