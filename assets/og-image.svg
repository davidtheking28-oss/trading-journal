<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030912"/>
      <stop offset="100%" stop-color="#070f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f7fff"/>
      <stop offset="100%" stop-color="#9b72ff"/>
    </linearGradient>
    <linearGradient id="chartfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f7fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4f7fff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#4f7fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4f7fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#9b72ff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#9b72ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="url(#accent)"/>
  <svg x="91" y="91" width="34" height="34" viewBox="0 0 200 200">
    <line x1="44" y1="60" x2="156" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
    <line x1="44" y1="100" x2="156" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
    <line x1="44" y1="140" x2="156" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
    <rect x="52" y="120" width="18" height="24" rx="4" fill="#ff6b8a"/>
    <rect x="83" y="100" width="18" height="44" rx="4" fill="#6fa3ff"/>
    <rect x="114" y="76" width="18" height="68" rx="4" fill="#6fa3ff"/>
    <rect x="145" y="60" width="18" height="84" rx="4" fill="#00e676"/>
    <polyline points="61,132 92,109 123,85 154,69" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round"/>
  </svg>

  <!-- Logo text -->
  <text x="150" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#e4ecf8" letter-spacing="-0.5">Trading Journal</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#e4ecf8" letter-spacing="-2">יומן מסחר מקצועי</text>
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" letter-spacing="-2">
    <tspan fill="#6fa3ff">עקוב, נתח</tspan>
    <tspan fill="#e4ecf8"> ושפר עם AI</tspan>
  </text>

  <!-- Sub -->
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#7a9cc4" letter-spacing="-0.3">ייבא עסקאות אוטומטית · ניתוח ביצועים · חיבור לברוקר · חינמי לחלוטין</text>

