name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Inject Supabase credentials from GitHub Secrets into dashboard.html
      # The source file contains __SUPABASE_URL__ and __SUPABASE_ANON__ placeholders
      # — no real keys ever appear in the git repository
      - name: Inject Supabase config
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" dashboard.html
          sed -i "s|__SUPABASE_ANON__|${{ secrets.SUPABASE_ANON_KEY }}|g" dashboard.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
