  <rect x="756" y="344" width="352" height="44" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="772" y="371" font-family="monospace" font-size="14" font-weight="600" fill="#e4ecf8">NVDA</text>
  <text x="840" y="371" font-family="monospace" font-size="12" fill="#3d5a7a">Long · 42d</text>
  <text x="1088" y="371" font-family="monospace" font-size="14" font-weight="600" fill="#00e676" text-anchor="end">+$1,240</text>

  <rect x="756" y="396" width="352" height="44" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="772" y="423" font-family="monospace" font-size="14" font-weight="600" fill="#e4ecf8">BTC</text>
  <text x="840" y="423" font-family="monospace" font-size="12" fill="#3d5a7a">Long · 7d</text>
  <text x="1088" y="423" font-family="monospace" font-size="14" font-weight="600" fill="#00e676" text-anchor="end">+$890</text>

  <rect x="756" y="448" width="352" height="44" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="772" y="475" font-family="monospace" font-size="14" font-weight="600" fill="#e4ecf8">TSLA</text>
  <text x="840" y="475" font-family="monospace" font-size="12" fill="#3d5a7a">Short · 3d</text>
  <text x="1088" y="475" font-family="monospace" font-size="14" font-weight="600" fill="#ff4060" text-anchor="end">-$210</text>

  <!-- AI badge -->
  <rect x="756" y="504" width="352" height="38" rx="8" fill="rgba(155,114,255,0.06)" stroke="rgba(155,114,255,0.15)" stroke-width="1"/>
  <rect x="768" y="514" width="18" height="18" rx="5" fill="url(#accent)"/>
  <text x="796" y="527" font-family="monospace" font-size="11" fill="rgba(196,167,255,0.9)">AI: win rate השתפר ב-+8%</text>

  <!-- Bottom badges -->
  <rect x="80" y="480" width="160" height="36" rx="18" fill="rgba(0,230,118,0.08)" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
  <circle cx="104" cy="498" r="5" fill="#00e676"/>
  <text x="118" y="503" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#00e676">ללא כרטיס אשראי</text>

  <rect x="252" y="480" width="140" height="36" rx="18" fill="rgba(79,127,255,0.08)" stroke="rgba(79,127,255,0.2)" stroke-width="1"/>
  <text x="322" y="503" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#6fa3ff" text-anchor="middle">הרשמה בדקה</text>

  <rect x="404" y="480" width="130" height="36" rx="18" fill="rgba(155,114,255,0.08)" stroke="rgba(155,114,255,0.2)" stroke-width="1"/>
  <text x="469" y="503" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#b89dff" text-anchor="middle">חינמי לחלוטין</text>
