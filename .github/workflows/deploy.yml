name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    concurrency:
      group: "pages"
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Inject Supabase credentials from GitHub Secrets into dashboard.html
      # The source file contains __SUPABASE_URL__ and __SUPABASE_ANON__ placeholders
      # — no real keys ever appear in the git repository
      - name: Inject Supabase config
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" dashboard.html
          sed -i "s|__SUPABASE_ANON__|${{ secrets.SUPABASE_ANON_KEY }}|g" dashboard.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy edgar       --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy finnhub     --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy groq        --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy ibkr        --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy fmp         --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy alphavantage --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy coingecko   --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy fear-greed        --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy crypto-fear-greed --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy theme-tracker     --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
          supabase functions deploy sector-holdings   --project-ref fnklrqxwyeibfptaxewf --no-verify-jwt
